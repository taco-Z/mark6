<h1>{{login_title}}</h1>

<div class="lang">
    <a href="?lang=en">EN</a> |
    <a href="?lang=ja">JA</a>
</div>

<form method="post" action="operation.cgi">
    <input type="hidden" name="action" value="do_login">

    <p>{{user_id}}</p>
    <input type="text" name="id">

    <p>{{password}}</p>
    <input type="password" name="pwd">

    <p>
        <button type="submit">{{login_button}}</button>
    </p>
</form>
